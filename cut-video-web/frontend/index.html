<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASR 视频剪辑工作室</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <!-- App Container -->
    <div class="app" id="app">

        <!-- ==================== HEADER ==================== -->
        <header class="header">
            <div class="header-left">
                <div class="brand">
                    <svg class="brand-icon" viewBox="0 0 32 32" fill="none">
                        <rect x="2" y="8" width="28" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
                        <path d="M13 12L21 17L13 22V12Z" fill="currentColor"/>
                    </svg>
                    <span class="brand-text">ASR 剪辑</span>
                </div>
                <button class="btn btn-ghost" id="btn-select-video" title="选择视频">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </svg>
                    <span>选择视频</span>
                </button>
                <input type="file" id="file-input-editor" accept="video/*" hidden>
            </div>

            <div class="header-center"></div>

            <div class="header-right">
                <div class="action-group">
                    <button class="btn btn-ghost" id="btn-undo" disabled title="撤销">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"/>
                            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
                        </svg>
                    </button>
                    <button class="btn btn-ghost" id="btn-reset" disabled title="重置">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                    </button>
                </div>
                <button class="btn btn-ghost" id="btn-generate" disabled title="生成字幕">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                    <span>生成字幕</span>
                </button>
                <label class="subtitle-toggle" for="toggle-subtitles">
                    <input type="checkbox" id="toggle-subtitles">
                    <span>烧录字幕</span>
                </label>
                <button class="btn btn-secondary" id="btn-preview" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span>执行剪辑</span>
                </button>
                <button class="btn btn-primary" id="btn-export" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span>导出视频</span>
                </button>
            </div>
        </header>

        <!-- ==================== MAIN CONTENT ==================== -->
        <main class="main">

            <!-- Upload View -->
            <section class="view view-upload active" id="view-upload">
                <div class="upload-container">
                    <div class="upload-card" id="upload-card">
                        <input type="file" id="file-input" accept="video/*" hidden>

                        <div class="upload-visual">
                            <div class="upload-icon-wrap">
                                <svg class="upload-icon" viewBox="0 0 64 64" fill="none">
                                    <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="1.5" stroke-dasharray="6 4" class="upload-circle"/>
                                    <path d="M32 20v24M20 32h24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="upload-plus"/>
                                </svg>
                            </div>
                            <div class="upload-text">
                                <h2 class="upload-title">拖拽视频文件</h2>
                                <p class="upload-desc">或点击选择文件</p>
                            </div>
                            <div class="upload-formats">
                                <span class="format-badge">MP4</span>
                                <span class="format-badge">MOV</span>
                                <span class="format-badge">AVI</span>
                            </div>
                        </div>

                        <div class="upload-features">
                            <div class="feature">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                                </svg>
                                <span>AI 词级转写</span>
                            </div>
                            <div class="feature">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <path d="M9 9h6v6H9z"/>
                                </svg>
                                <span>精准时间戳</span>
                            </div>
                            <div class="feature">
                                <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                    <polyline points="7 10 12 15 17 10"/>
                                    <line x1="12" y1="15" x2="12" y2="3"/>
                                </svg>
                                <span>一键导出</span>
                            </div>
                        </div>

                        <div class="upload-note">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M12 16v-4M12 8h.01"/>
                            </svg>
                            <span>自动使用 paraformer-v1 模型 + 热词优化</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Loading View -->
            <section class="view view-loading" id="view-loading">
                <div class="loading-container">
                    <div class="loading-animation">
                        <svg class="loading-spinner" viewBox="0 0 50 50">
                            <circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-dasharray="80 60"/>
                        </svg>
                    </div>
                    <h2 class="loading-title" id="loading-title">正在处理...</h2>
                    <p class="loading-desc" id="loading-desc">视频上传完成，正在进行 ASR 转写</p>
                    <div class="loading-bar">
                        <div class="loading-bar-fill" id="loading-bar"></div>
                    </div>
                </div>
            </section>

            <!-- Editor View -->
            <section class="view view-editor" id="view-editor">
                <!-- Left: Video Preview -->
                <div class="preview-panel">
                    <div class="preview-wrapper">
                        <div class="video-container">
                            <video id="video-player"></video>
                            <div class="preview-overlay" id="preview-overlay">
                                <span class="subtitle-overlay" id="subtitle-overlay"></span>
                            </div>
                            <div class="preview-badge" id="preview-badge">预览中</div>
                        </div>
                    </div>

                    <!-- Video Controls -->
                    <div class="video-controls">
                        <div class="video-progress">
                            <div class="progress-bar" id="progress-bar">
                                <div class="progress-fill" id="progress-fill"></div>
                                <div class="progress-thumb" id="progress-thumb"></div>
                            </div>
                        </div>
                        <div class="video-transport">
                            <div class="transport" id="transport">
                                <button class="transport-btn" id="btn-back" title="后退 5秒">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polygon points="11 19 2 12 11 5 11 19" fill="currentColor"/>
                                        <polygon points="22 19 13 12 22 5 22 19" fill="currentColor"/>
                                    </svg>
                                </button>
                                <button class="transport-btn transport-play" id="btn-play">
                                    <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
                                        <polygon points="6 4 20 12 6 20 6 4"/>
                                    </svg>
                                    <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
                                        <rect x="5" y="4" width="4" height="16" rx="1"/>
                                        <rect x="15" y="4" width="4" height="16" rx="1"/>
                                    </svg>
                                </button>
                                <button class="transport-btn" id="btn-forward" title="前进 5秒">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polygon points="13 19 22 12 13 5 13 19" fill="currentColor"/>
                                        <polygon points="2 19 11 12 2 5 2 19" fill="currentColor"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="timecode" id="timecode">
                                <span id="time-current">00:00:00</span>
                                <span class="time-sep">/</span>
                                <span id="time-total">00:00:00</span>
                            </div>
                        </div>
                    </div>

                    <div class="preview-meta">
                        <span class="file-label" id="file-label">—</span>
                    </div>
                </div>

                <!-- Right: Transcript Panel -->
                <div class="transcript-panel">
                    <div class="transcript-header">
                        <h3 class="transcript-title">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                            </svg>
                            词级字幕
                        </h3>
                        <div class="transcript-stats">
                            <span class="stat deleted-stat">
                                <span class="stat-num" id="stat-deleted">0</span> 已删
                            </span>
                            <span class="stat-sep">·</span>
                            <span class="stat edited-stat">
                                <span class="stat-num" id="stat-edited">0</span> 已编辑
                            </span>
                            <span class="stat-sep">·</span>
                            <span class="stat total-stat">
                                <span class="stat-num" id="stat-total">0</span> 总计
                            </span>
                        </div>
                    </div>

                    <!-- Timeline -->
                    <div class="timeline">
                        <div class="timeline-ruler" id="timeline-ruler"></div>
                        <div class="timeline-track" id="timeline-track"></div>
                    </div>

                    <!-- Word List -->
                    <div class="word-list" id="word-list"></div>

                    <!-- Transcript Footer -->
                    <div class="transcript-footer">
                        <span class="footer-hint">
                            <kbd>Space</kbd> 播放
                            <kbd>←</kbd><kbd>→</kbd> 跳转
                            <kbd>点击</kbd> 删除
                            <kbd>双击</kbd> 编辑
                        </span>
                    </div>
                </div>
            </section>

        </main>

        <!-- ==================== EXPORT MODAL ==================== -->
        <div class="modal-overlay" id="modal-export">
            <div class="modal">
                <div class="modal-icon" id="modal-export-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </div>
                <h2 class="modal-title" id="modal-export-title">正在导出...</h2>
                <div class="export-progress" id="export-progress">
                    <div class="export-progress-bar">
                        <div class="export-progress-fill" id="export-progress-fill"></div>
                    </div>
                </div>
                <p class="modal-desc" id="modal-export-desc">正在处理视频，请稍候...</p>
                <div class="export-output-dir" id="export-output-info" style="display:none">
                    <span class="output-path" id="output-path"></span>
                </div>
                <div class="modal-actions" id="modal-export-actions" style="display:none">
                    <button class="btn btn-primary" id="btn-export-ok">确定</button>
                </div>
            </div>
        </div>

        <!-- ==================== RESULT MODAL (legacy) ==================== -->
        <div class="modal-overlay" id="modal-result" style="display:none">
            <div class="modal">
                <div class="modal-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 12l3 3 5-6"/>
                    </svg>
                </div>
                <h2 class="modal-title">导出完成</h2>
                <p class="modal-desc">已保留 <span class="highlight" id="modal-kept">0</span> 个词</p>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="btn-new">处理新视频</button>
                    <button class="btn btn-primary" id="btn-download">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        下载视频
                    </button>
                </div>
            </div>
        </div>

        <!-- Toast Container -->
        <div class="toast-container" id="toast-container"></div>

    </div>

    <!-- Download iframe -->
    <iframe id="download-frame" style="display:none;"></iframe>

    <script type="module" src="/app.js"></script>
</body>
</html>
